<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening ITZ Player...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #redirectStatusOverlay {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 350px;
        }
        .badge { background: #007bff; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: inline-block; }
        h2 { margin: 10px 0; font-size: 22px; color: #fff; }
        p { color: #aaaaaa; font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .progress-bar { background: #333; height: 6px; border-radius: 3px; overflow: hidden; margin: 20px 0; }
        #redirectStatusProgressFill { background: #007bff; height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        .btn { background: #007bff; color: white; padding: 14px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; display: block; margin-top: 20px; font-size: 16px; transition: background 0.2s;}
        .btn:active { background: #0056b3; }
    </style>
</head>
<body>

    <div id="redirectStatusOverlay">
        <span class="badge">Android Handoff</span>
        <h2>Opening ITZ Player</h2>
        <p>new verification video directly inside the Smart Track ITZ app.</p>
        
        <div class="progress-bar">
            <div id="redirectStatusProgressFill"></div>
        </div>
        
        <p style="font-size: 12px; color: #777;">If the app does not open automatically in a few seconds, tap the button below.</p>
        
        <a id="actionBtn" href="#" class="btn">Open App Manually</a>
    </div>

    <script>
        // 1. Grab the video link from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const rawUrl = urlParams.get('url');

        if (rawUrl) {
            // 2. Encode the Terabox link
            const safeUrl = encodeURIComponent(rawUrl);

            // 3. The Pure Android Intent
            // This is the cleanest possible way to tell Chrome to open an app.
            // No Play Store fallback, no tracking garbage. Just direct app launch.
            const intentUrl = "intent://play?url=" + safeUrl + "#Intent;scheme=itz;package=com.smart.track.itz;end;";

            // 4. Attach it to the button
            const actionBtn = document.getElementById('actionBtn');
            actionBtn.href = intentUrl;

            // 5. Animate the progress bar
            setTimeout(() => {
                document.getElementById('redirectStatusProgressFill').style.width = "100%";
            }, 100);

            // 6. Attempt automatic redirect after 1.5 seconds
            setTimeout(() => {
                // We use button click instead of window.location to bypass Chrome's popup blocker
                actionBtn.click();
            }, 1500);

        } else {
            document.querySelector('#redirectStatusOverlay').innerHTML = "<h3 style='color:#ff4444;'>Error</h3><p>No video URL was provided.</p>";
        }
    </script>

</body>
</html>
